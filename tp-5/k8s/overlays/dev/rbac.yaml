apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-role
  namespace: app-dev
rules:
- apiGroups: ["", "apps", "networking.k8s.io"]
  resources: ["pods", "pods/log", "pods/exec", "services", "configmaps", "deployments", "ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-binding
  namespace: app-dev
subjects:
- kind: User
  name: dev-user
roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
